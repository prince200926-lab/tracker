<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Academic Goals Tracker</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div id="root">
    <header>
      <div>
        <h1>Academic Goals Tracker</h1>
        <p id="user-welcome" style="color: var(--text-secondary); font-size: 14px;"></p>
      </div>
      <div style="display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;">
        <button id="toggle-theme">Theme</button>
        <button id="logout-btn">Logout</button>
      </div>
    </header>
    <main>
      <div style="display: flex; flex-direction: column; gap: 16px; margin-bottom: 24px;">
        <h2 style="text-align: center; margin: 0;">Your Groups</h2>
        <div style="display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;">
          <button onclick="window.location.href='/create-group'" style="background: var(--accent); color: white; border: none;">Create Group</button>
          <button onclick="window.location.href='/join-group'">Join Group</button>
        </div>
      </div>
      <div id="groups-container"></div>
    </main>
  </div>
  <script>
    const API_BASE = 'https://tracker-h319.onrender.com/api';
    let isDark = localStorage.getItem('theme') === 'dark';

    function applyTheme() {
      document.documentElement.style.colorScheme = isDark ? 'dark' : 'light';
      document.getElementById('toggle-theme').textContent = isDark ? '☀️' : '🌙';
    }
    applyTheme();

    document.getElementById('toggle-theme').addEventListener('click', () => {
      isDark = !isDark;
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      applyTheme();
    });

    document.getElementById('logout-btn').addEventListener('click', () => {
      localStorage.removeItem('token');
      window.location.href = '/login';
    });

    async function loadDashboard() {
      const token = localStorage.getItem('token');
      if (!token) { window.location.href = '/login'; return; }

      try {
        const res = await fetch(API_BASE + '/auth/profile', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (!res.ok) throw new Error();
        const user = await res.json();
        document.getElementById('user-welcome').textContent = 'Welcome, ' + (user.displayName || user.username);

        const groupsRes = await fetch(API_BASE + '/groups/user', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const groups = await groupsRes.json();

        const container = document.getElementById('groups-container');
        if (!groups.length) {
          container.innerHTML = '<div class="card" style="text-align: center; padding: 32px;"><p style="color: var(--text-secondary); margin-bottom: 16px;">You haven\'t joined any groups yet</p></div>';
          return;
        }

        const myGroups = groups.filter(g => g.members?.some(m => (m.userId || m) === user.userId));
        const ledGroups = myGroups.filter(g => g.leaderId === user.userId);
        const memberGroups = myGroups.filter(g => g.leaderId !== user.userId);

        let html = '';
        if (ledGroups.length) {
          html += '<h3 style="color: var(--text-secondary); margin-bottom: 12px; text-align: center;">Groups You Lead (' + ledGroups.length + ')</h3>';
          html += '<div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; margin-bottom: 24px;">';
          ledGroups.forEach(g => {
            html += '<div class="card" onclick="window.location.href=\'/group/' + g.groupId + '\'" style="cursor: pointer; border: 2px solid var(--accent);">';
            html += '<div style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 8px;">';
            html += '<div style="flex: 1; min-width: 150px;"><h3 style="margin: 0;">' + g.groupName + '</h3><p style="color: var(--text-muted); font-size: 13px;">' + (g.members?.length || 0) + ' members</p><p style="color: var(--text-muted); font-size: 12px;">Code: ' + g.groupCode + '</p></div>';
            html += '<span style="background: var(--accent); color: white; padding: 4px 8px; border-radius: 4px; font-size: 11px; white-space: nowrap;">Leader</span>';
            html += '</div><div style="margin-top: 12px; display: flex; gap: 8px;">';
            html += '<button onclick="event.stopPropagation(); window.location.href=\'/group/' + g.groupId + '\'" style="flex: 1; font-size: 13px;">Manage</button>';
            html += '<button onclick="event.stopPropagation(); deleteGroup(\'' + g.groupId + '\')" style="background: var(--error); color: white; border: none; font-size: 13px;">Delete</button>';
            html += '</div></div>';
          });
          html += '</div>';
        }

        if (memberGroups.length) {
          html += '<h3 style="color: var(--text-secondary); margin-bottom: 12px; text-align: center;">Groups You\'re In (' + memberGroups.length + ')</h3>';
          html += '<div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px;">';
          memberGroups.forEach(g => {
            html += '<div class="card" onclick="window.location.href=\'/group/' + g.groupId + '\'" style="cursor: pointer;">';
            html += '<h3 style="margin: 0 0 4px;">' + g.groupName + '</h3>';
            html += '<p style="color: var(--text-muted); font-size: 13px;">' + (g.members?.length || 0) + ' members · Code: ' + g.groupCode + '</p>';
            html += '<div style="margin-top: 12px; display: flex; gap: 8px;">';
            html += '<button onclick="event.stopPropagation(); window.location.href=\'/group/' + g.groupId + '\'" style="flex: 1; font-size: 13px;">View Tasks</button>';
            html += '<button onclick="event.stopPropagation(); leaveGroup(\'' + g.groupId + '\')" style="background: var(--error); color: white; border: none; font-size: 13px;">Leave</button>';
            html += '</div></div>';
          });
          html += '</div>';
        }

        container.innerHTML = html;
      } catch {
        localStorage.removeItem('token');
        window.location.href = '/login';
      }
    }

    async function deleteGroup(groupId) {
      if (!confirm('Delete this group? This cannot be undone.')) return;
      const token = localStorage.getItem('token');
      await fetch(API_BASE + '/groups/' + groupId, {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + token }
      });
      loadDashboard();
    }

    async function leaveGroup(groupId) {
      if (!confirm('Leave this group?')) return;
      const token = localStorage.getItem('token');
      await fetch(API_BASE + '/groups/leave', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ groupId })
      });
      loadDashboard();
    }

    loadDashboard();
  </script>
</body>
</html>
