<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Academic Goals Tracker</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div id="root">
    <div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px;">
      <div style="width: 100%; max-width: 400px;">
        <div style="text-align: center; margin-bottom: 24px;">
          <h1>Create Account</h1>
          <p style="color: var(--text-secondary); font-size: 14px;">Join your study groups</p>
        </div>
        <div class="card" style="padding: 20px;">
          <div id="error-msg" class="error" style="display: none; margin-bottom: 12px;"></div>
          <form id="register-form" style="display: flex; flex-direction: column; gap: 14px;">
            <div class="form-group">
              <label for="username">Username</label>
              <input type="text" id="username" required>
            </div>
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" required>
            </div>
            <div class="form-group">
              <label for="password">Password</label>
              <input type="password" id="password" required>
            </div>
            <button type="submit" id="submit-btn" style="background: var(--accent); color: white; border: none;">Create account</button>
          </form>
          <p style="text-align: center; margin-top: 14px; font-size: 14px;">
            Already have an account? <a href="/login" style="color: var(--accent);">Sign in</a>
          </p>
        </div>
      </div>
    </div>
  </div>
  <script>
    const API_BASE = 'https://tracker-h319.onrender.com/api';

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const errEl = document.getElementById('error-msg');
      errEl.style.display = 'none';
      btn.textContent = 'Creating account...';
      btn.disabled = true;

      try {
        const res = await fetch(API_BASE + '/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Registration failed');
        localStorage.setItem('token', data.token);
        window.location.href = '/dashboard';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
      } finally {
        btn.textContent = 'Create account';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
